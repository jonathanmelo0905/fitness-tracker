<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-icon name="leaf-outline" class="brand-icon"></ion-icon>
    </ion-buttons>
    <ion-title>NutriEval</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" class="logout-btn" (click)="confirmarLogout()">
        <span class="user-name">{{ userName() }}</span>
        <ion-icon name="log-out-outline" slot="end"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-tabs>

  <ion-tab-bar slot="bottom">

    <ion-tab-button tab="clientes" href="/clientes">
      <ion-icon name="people-outline"></ion-icon>
      <ion-label>Clientes</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="herramientas" href="/herramientas">
      <ion-icon name="construct-outline"></ion-icon>
      <ion-label>Herramientas</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="agenda" href="/agenda">
      <ion-icon name="calendar-outline"></ion-icon>
      <ion-label>Agenda</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="settings" href="/settings">
      <ion-icon name="settings-outline"></ion-icon>
      <ion-label>Ajustes</ion-label>
    </ion-tab-button>

  </ion-tab-bar>

</ion-tabs>
